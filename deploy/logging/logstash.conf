# Logstash配置文件
input {
  # 文件输入 - 应用日志
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "application"
  }

  # Beats输入 - Filebeat
  beats {
    port => 5044
  }

  # TCP输入
  tcp {
    port => 5000
    codec => "json"
  }
}

filter {
  # 解析应用日志
  if [type] == "application" {
    json {
      source => "message"
    }
    
    # 日期解析
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
    }
    
    # 地理IP解析
    if [client_ip] {
      geoip {
        source => "client_ip"
        target => "geoip"
      }
    }
    
    # 用户代理解析
    if [user_agent] {
      useragent {
        source => "user_agent"
        target => "user_agent_parsed"
      }
    }
  }

  # 移除不需要的字段
  mutate {
    remove_field => [ "host", "agent", "input", "log", "ecs" ]
  }
}

output {
  # 输出到Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "youding-logs-%{+YYYY.MM.dd}"
  }

  # 调试输出（可选）
  # stdout { codec => rubydebug }
}
